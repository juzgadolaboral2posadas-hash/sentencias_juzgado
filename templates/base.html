<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP - Juzgado Laboral 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; font-family: 'Segoe UI', sans-serif; }
        .sidebar { height: 100vh; background-color: #1e1e1e; border-right: 1px solid #333; position: fixed; width: 250px; }
        .content { margin-left: 250px; padding: 20px; }
        .nav-link { color: #adb5bd; margin-bottom: 5px; border-radius: 5px; }
        .nav-link:hover, .nav-link.active { background-color: #0d6efd; color: white; }
        .card { background-color: #1e1e1e; border: 1px solid #333; }
        .btn-primary { background-color: #0d6efd; border: none; }
        h1, h2, h3 { color: #e0e0e0; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <div class="sidebar d-flex flex-column p-3">
        <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
            <i class="bi bi-bank2 fs-4 me-2"></i>
            <span class="fs-5 fw-bold">Juzgado Lab. 2</span>
        </a>
        <hr>
        
            <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item mb-2">
                <a href="/" class="nav-link text-white {% if request.path == '/' %}active{% endif %}">
                    <i class="bi bi-speedometer2 me-2"></i>
                    Tablero
                </a>
            </li>
            
            <li class="nav-item mb-2">
                <a href="/relatoria" class="nav-link text-white {% if request.path == '/relatoria' %}active{% endif %}">
                    <i class="bi bi-search me-2"></i> Buscador IA
                </a>
            </li>

            <li class="nav-item mb-2">
                <a href="/auditoria" class="nav-link text-white {% if request.path == '/auditoria' %}active{% endif %}">
                    <i class="bi bi-clipboard-check me-2"></i> Control de Proyectos
                </a>
            </li>

            <li class="nav-item mb-2">
                <a href="/biblioteca" class="nav-link text-white {{ 'active' if request.url.path == '/biblioteca' else '' }}">
                     <i class="bi bi-book me-2"></i>
                    Reglas de Estilo
                </a>
            </li>

            <li class="nav-item">
                <a href="/historial" class="nav-link text-white {{ 'active' if request.url.path == '/historial' else '' }}">
                    <i class="bi bi-clock-history me-2"></i>
                    Historial
                </a>
</li>
        </ul>
        <hr>
        <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-white text-decoration-none">
                <i class="bi bi-person-circle me-2"></i>
                <strong>Juez Mangini</strong>
            </a>
        </div>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
