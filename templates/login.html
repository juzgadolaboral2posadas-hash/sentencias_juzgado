<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Judicial - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { max-width: 400px; width: 100%; border: 1px solid #333; background: #1e1e1e; }
    </style>
</head>
<body>
    <div class="card login-card shadow-lg p-4">
        <div class="text-center mb-4">
            <i class="bi bi-bank display-1 text-primary"></i>
            <h3 class="mt-3 text-light">Juzgado Laboral N.º 2</h3>
            <p class="text-muted small">Sistema de Inteligencia Artificial</p>
        </div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label text-light">Usuario</label>
                <input type="text" class="form-control bg-dark text-light border-secondary" id="username" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label text-light">Contraseña</label>
                <input type="password" class="form-control bg-dark text-light border-secondary" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Ingresar</button>
        </form>
        <p class="mt-3 text-center text-danger small" id="errorMsg"></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);

            const msg = document.getElementById('errorMsg');
            msg.innerText = "Verificando...";

            try {
                const res = await fetch('/token', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (res.ok) {
                    window.location.href = data.redirect;
                } else {
                    msg.innerText = data.error || "Error de acceso";
                }
            } catch (err) {
                msg.innerText = "Error de conexión";
            }
        });
    </script>
</body>
</html>
